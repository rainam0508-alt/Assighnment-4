<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

/* Form container */
.container {
    display: flex;                 
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Form box */
form {
    background-color: white;
    padding: 25px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
}

/* Heading */
h2 {
    text-align: center;
    margin-bottom: 15px;
}

/* Form groups */
.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;   
}

/* Inputs */
input[type="text"],
input[type="email"],
input[type="password"] {
    padding: 10px;        
    border: 1px solid #ccc;
    border-radius: 6px;
    margin-top: 5px;
}

/* Radio & checkbox */
.options {
    margin-top: 5px;
}

.options input {
    margin-right: 5px;
}

/* Button */
input[type="submit"] {
    width: 100%;
    padding: 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

/* Hover effect */
input[type="submit"]:hover {
    background-color: #45a049;
}

</style>
</head>

<body>

<div class="container">

<form>

<h2>Student Registration</h2>

<div class="form-group">
<label>Name</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<div class="form-group">
<label>City</label>
<input type="text" name="city">
</div>

<div class="form-group">
<label>Gender</label>
<div class="options">
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</div>
</div>

<div class="form-group">
<label>Hobbies</label>
<div class="options">
<input type="checkbox"> Reading
<input type="checkbox"> Sports
<input type="checkbox"> Music
</div>
</div>

<input type="submit" value="Register">

</form>

</div>

</body>
</html>
